name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  # Lets you re-run a deploy from the Actions tab without pushing a commit.
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Let a running deploy finish rather than cancelling it midway, but only queue
# one at a time.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static export
        env:
          # NEXT_PUBLIC_* vars are inlined at BUILD time, and this is a static
          # export, so the key must exist here or the deployed form can never
          # send. It is baked into the public JS bundle either way, which is how
          # Web3Forms is designed: the key is a submission token, not a secret.
          #
          # Set it at: Settings > Secrets and variables > Actions > New secret,
          # named NEXT_PUBLIC_FORM_ENDPOINT.
          #
          # Without it the build still succeeds and the form falls back to
          # telling visitors to use the mailto link.
          NEXT_PUBLIC_FORM_ENDPOINT: ${{ secrets.NEXT_PUBLIC_FORM_ENDPOINT }}
        run: npm run build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
